version: '3.9'

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-auction_db}
      POSTGRES_USER:     ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d auction_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Application Services ────────────────────────────────────────────────────

  backend:
    build:
      context: .                       # repo root — gives access to pnpm-lock.yaml
      dockerfile: backend/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service/app:/app/app      # hot reload — app only, NOT venv
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  pgdata:

# NOTE: Frontend is NOT containerised.
# Run with: cd apps/web && pnpm dev   (port 5173)
